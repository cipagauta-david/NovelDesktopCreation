<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160" preserveAspectRatio="none">
  <filter id='roughpaper'>
    <feTurbulence type="fractalNoise" baseFrequency='0.01' result='noise' numOctaves="5" />

    <feDiffuseLighting in='noise' lighting-color='#fff' surfaceScale='4'>
      <feDistantLight azimuth='20' elevation='50' />
    </feDiffuseLighting>
  </filter>

  <rect width="100%" height="100%" filter="url(#roughpaper)" opacity="0.95" />
</svg>